server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # hashed assets — long cache
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # other static files
  location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?|ttf|otf|eot)$ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # never cache the entry HTML
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA fallback (TanStack Router uses client-side routes)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
